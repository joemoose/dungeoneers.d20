name: ci
on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild manually
permissions:
  contents: write           # needed to push the gh-pages branch
concurrency:
  group: deploy
  cancel-in-progress: false # don't let overlapping pushes race
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict     # fail loudly on broken links/nav
      - run: mkdocs gh-deploy --force --no-history