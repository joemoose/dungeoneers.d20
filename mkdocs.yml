# Project information

site_name: Dungeoneers RPG
site_url: https://joemoose.github.io/dungeoneers/
site_author: Zachary Taylor
site_description: An Adventure Game for Errant Rogues.
# site_dir: ../joemoose.github.io/dungeoneers/

# Repo

repo_url: https://github.com/joemoose/dungeoneers/
edit_uri: blob/main/docs/

# Navigation

nav:
  - index.md
  - character.md
  - equipment.md
  - play.md
  - combat.md
  - damage.md
  - spells.md
  - advancement.md
  - Appendices:
      - appendix-a.md
      - appendix-b.md
      - appendix-c.md
      - appendix-d.md
      - appendix-e.md
      - appendix-f.md
      - appendix-g.md
      - appendix-h.md
  - attribution.md

# Theme

theme:
  name: material
  logo: logo.png
  favicon: favicon.ico
  icon:
#    repo: fontawesome/brands/github
    edit: octicons/pencil-24
  features:
    - header.autohide
    - content.action.edit
    - navigation.footer
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: black
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Extensions

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# CSS

extra_css:
  - extra.css

# Plugins

plugins:
  - search
  - git-revision-date-localized:
#      enable_creation_date: false
#      type: date
#      fallback_to_build_date: true

