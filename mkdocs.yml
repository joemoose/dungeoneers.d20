# Project information

site_name: Dungeoneers RPG
site_url: https://joemoose.github.io/dungeoneers/
site_author: Zachary Taylor
site_description: An Adventure Game for Errant Rogues
site_dir: ../joemoose.github.io/dungeoneers

# Repo

repo_url: https://github.com/joemoose/dungeoneers/
edit_uri: edit/main/docs

# Navigation

nav:
  - 'Preface': index.md
  - character.md
  - equipment.md
  - play.md
  - combat.md
  - damage.md
  - spells.md
  - attribution.md
  - Appendices:
    - 'Appendix A: Rules Reference': appendix-a-reference.md
    - 'Appendix B: Equipment': appendix-b-sundries.md
    - 'Appendix C: Mounts': appendix-c-mounts.md
    - 'Appendix D: Renown': appendix-d-renown.md
    - 'Appendix E: Advancement': appendix-e-advancement.md
    - 'Appendix F: Corruption': appendix-f-corruption.md
    - 'Appendix G: Dragonpowder': appendix-g-dragonpowder.md
  
  
# Theme

theme:
  name: material
  language: en
  font: false
  logo: logo.png
  favicon: favicon.ico
  icon:
    edit: octicons/pencil-24
  features:
    - content.action.edit
    - content.tooltips
    - header.autohide
    - navigation.footer
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: black
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Extensions

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

# CSS

extra_css:
  - stylesheets/extra.css
  - stylesheets/print.css

# Plugins

plugins:
  - search:
      lang: en
  