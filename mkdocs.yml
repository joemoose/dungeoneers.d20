# Project information

site_name: Dungeoneers RPG
site_url: https://joemoose.github.io/dungeoneers
site_author: Zachary Taylor

# Navigation

nav:
  - Home: README.md
  - 1 Make an Adventurer.md
  - 2 Equipment.md
  - 3 How to Play.md
  - 3.1 Combat.md
  - 3.2 Damage.md
  - 3.3 Spells.md
  - 3.4 Advancement.md
  - 5 Appendix.md
  - 4 Attribution.md

# Theme

theme:
  name: material
  logo: tyros_icon.png
  favicon: favicon.ico
  icon:
    repo: fontawesome/brands/github
    edit: fontawesome/solid/pencil
  features:
    - content.action.edit
    - navigation.footer
    - navigation.instant
#    - navigation.sections
#    - navigation.expand
#    - navigation.tabs
#    - navigation.tabs.sticky
#    - navigation.tracking
    - navigation.top
    - header.autohide
#    - toc.integrate
#    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: black
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Extensions

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences

# CSS

extra_css:
  - extra.css

# Repo

repo_url: https://github.com/joemoose/Dungeoneers-RPG
edit_uri: edit/main/docs/

# Plugins

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
      fallback_to_build_date: true

