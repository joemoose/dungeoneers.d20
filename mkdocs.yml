# Project information

site_name: DUNGEONEERS
site_url: https://joemoose.github.io/dungeoneers/
site_author: Zachary Taylor
site_description: An Adventure Roleplaying Game for Errant Rogues

# Repo

repo_url: https://github.com/joemoose/dungeoneers/
edit_uri: edit/main/docs

# Navigation

nav:
  - 'Preface': index.md
  - character.md
  - equipment.md
  - play.md
  - combat.md
  - damage.md
  - spells.md
  - attribution.md
#  - Appendices:
#    - 'Appendix A: Rules Reference': appendix-a-reference.md
#    - 'Appendix B: Equipment': appendix-b-sundries.md
#    - 'Appendix C: Mounts': appendix-c-mounts.md
#    - 'Appendix D: Renown': appendix-d-renown.md
#    - 'Appendix E: Advancement': appendix-e-advancement.md
#    - 'Appendix F: Corruption': appendix-f-corruption.md
#    - 'Appendix G: Dragonpowder': appendix-g-dragonpowder.md

# Theme

theme:
  name: material
  language: en
  font: false
  logo: img/logo.png
  favicon: img/favicon.ico
  icon:
    edit: octicons/pencil-24
  features:
    - content.action.edit
    - content.tooltips
    - header.autohide
    - navigation.footer
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - toc.follow
    
  palette:

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: black
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to Dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to Light mode

# Extensions

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html
  - pymdownx.snippets:
      base_path: [docs]
  - toc:
      permalink: true
      toc_depth: 3

# CSS

extra_css:
  - css/extra.css
  - css/print.css

# Plugins

plugins:
  - search:
      lang: en
  - social:
      cards_layout_dir: layouts
      cards_layout: blank
      cards_layout_options:
        background_image: docs/img/card.png
        background_color: transparent
